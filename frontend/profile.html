<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的资料</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page-wrap">

  <div class="page-header">
    <button class="back-btn" onclick="location.href='index.html'">← 返回大厅</button>
    <span class="page-title">我的资料</span>
  </div>

  <!-- Profile card -->
  <div class="profile-card">
    <div class="profile-avatar" id="profAvatar">-</div>
    <div class="profile-info">
      <h2 id="profName">-</h2>
      <div class="chips" id="profChips">♦ -</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-val" id="statPlayed">-</div>
      <div class="stat-lbl">总局数</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statWon">-</div>
      <div class="stat-lbl">胜局</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statTotalWon">-</div>
      <div class="stat-lbl">总赢筹码</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="statBigPot">-</div>
      <div class="stat-lbl">最大底池</div>
    </div>
  </div>

  <!-- Hand history -->
  <div class="section-card">
    <div class="sec-header">
      <span class="sec-title">🃏 历史对局</span>
      <button class="btn btn-ghost btn-sm" onclick="loadHands()">刷新</button>
    </div>
    <div id="handsList" style="color:var(--muted);text-align:center;padding:20px">加载中...</div>
  </div>

</div>

<script>
const API = '';

function loadSession() {
  try { return JSON.parse(localStorage.getItem('pokerSession')); } catch { return null; }
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function cardStr(c) {
  if (!c || !c.suit) return '';
  const suits = { S:'♠', H:'♥', D:'♦', C:'♣' };
  const isRed = c.suit === 'H' || c.suit === 'D';
  return `<span class="mini-card ${isRed ? 'red' : 'black'}">${suits[c.suit]}${c.rank}</span>`;
}

async function init() {
  const user = loadSession();
  if (!user) { location.href = 'index.html'; return; }

  try {
    const me = await fetch(`${API}/auth/me?token=${encodeURIComponent(user.token)}`).then(r=>r.json());
    document.getElementById('profAvatar').textContent   = user.username[0].toUpperCase();
    document.getElementById('profName').textContent     = me.username || user.username;
    document.getElementById('profChips').textContent    = `♦ ${(me.chips||0).toLocaleString()}`;
    document.getElementById('statPlayed').textContent   = me.handsPlayed || 0;
    document.getElementById('statWon').textContent      = me.handsWon    || 0;
    document.getElementById('statTotalWon').textContent = (me.totalWon||0).toLocaleString();
    document.getElementById('statBigPot').textContent   = (me.biggestPot||0).toLocaleString();
  } catch {}

  loadHands();
}

async function loadHands() {
  const user = loadSession();
  if (!user) return;
  const el = document.getElementById('handsList');
  try {
    const hands = await fetch(`${API}/auth/hands?token=${encodeURIComponent(user.token)}`).then(r=>r.json());
    if (!hands || hands.length === 0) {
      el.innerHTML = '<span style="color:var(--muted)">暂无历史对局</span>';
      return;
    }
    el.innerHTML = hands.map(h => {
      const me  = (h.players||[]).find(p => p.playerId === user.userId);
      const net = me?.net ?? ((me?.won??0) - (me?.bet??0));
      const netClass = net > 0 ? 'win' : net < 0 ? 'loss' : 'even';
      const netStr   = net > 0 ? `+${net}` : net < 0 ? `${net}` : '±0';
      const date = new Date(h.endedAt*1000).toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
      let community = '';
      try { community = JSON.parse(h.community).map(cardStr).join(''); } catch {}
      const players = (h.players||[]).map(p => {
        const cls = [
          'player-tag',
          p.playerId === user.userId ? 'is-me' : '',
          p.isWinner ? 'is-winner' : '',
          p.handRank === '弃牌' ? 'is-folded' : '',
        ].filter(Boolean).join(' ');
        return `<span class="${cls}">${esc(p.name)} ${p.handRank}${p.isWinner ? ' 🏆' : ''}</span>`;
      }).join('');
      return `<div class="hand-item">
        <div class="hand-header">
          <span class="hand-room">房间 #${esc(h.roomId)} · ${date}</span>
          <div class="hand-result">
            <span class="hand-pot">底池 ${(h.pot||0).toLocaleString()}</span>
            <span class="hand-net ${netClass}">${netStr}</span>
          </div>
        </div>
        ${community ? `<div class="hand-community">${community}</div>` : ''}
        <div class="hand-players">${players}</div>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = `<span style="color:var(--red)">加载失败</span>`;
  }
}

init();
</script>
</body>
</html>
